# Wanxiang seed tasks — English bootstrap set for autoschool.
#
# Language policy (flipped 2026-04-22 after first smoke test): the
# autoschool process runs in English end-to-end. English keywords have
# a far higher literal-match rate than Chinese equivalents because
# (a) LLM outputs don't switch mid-response, and (b) curriculum
# keywords are controllable tokens that are almost certain to appear
# verbatim (tool names, workflow names, English technical terms).
#
# User-facing surfaces (UI, memory, conversations) stay Chinese-first —
# this change is scoped to the seed/curriculum path only.
#
# Fields:
#   id, level, task, expected_outcome_keywords, tags
#
# Keyword strategy: prefer tokens that are mechanical / literal (tool
# names, numeric answers, exact workflow names) and avoid free-form
# terms ("team", "workflow") that the agent might paraphrase.

seed_tasks:

  # ---------- L0: Perception (10) ----------
  # Goal: verify self-awareness. No tool invocation required.

  - id: l0_01
    level: 0
    task: "List the tools you can currently use. Mention each by its exact name."
    expected_outcome_keywords: ["tool"]
    tags: [self_awareness, tool_inventory]

  - id: l0_02
    level: 0
    task: "Explain your basic workflow as a multi-agent system in one paragraph."
    expected_outcome_keywords: ["agent"]
    tags: [self_awareness, architecture]

  - id: l0_03
    level: 0
    task: "If a user asks you to write an article, what team would you form? Describe each role."
    expected_outcome_keywords: ["writer", "reviewer"]
    tags: [self_awareness, team_pattern]

  - id: l0_04
    level: 0
    task: "List the three workflow types you support (pipeline / parallel / review_loop) and give one use case for each."
    expected_outcome_keywords: ["pipeline", "parallel", "review_loop"]
    tags: [self_awareness, workflow]

  - id: l0_05
    level: 0
    task: "Explain what 'skill forge' means and under what condition it is typically triggered."
    expected_outcome_keywords: ["forge"]
    tags: [self_awareness, forge]

  - id: l0_06
    level: 0
    task: "Describe your tier trust system in one paragraph: how do tools get promoted or demoted?"
    expected_outcome_keywords: ["tier"]
    tags: [self_awareness, tier]

  - id: l0_07
    level: 0
    task: "Describe how the gap detector works: what signals does it read, what candidates does it output?"
    expected_outcome_keywords: ["gap"]
    tags: [self_awareness, gap_detector]

  - id: l0_08
    level: 0
    task: "List the kinds of data you currently persist (e.g. run logs, skill files, tier state)."
    expected_outcome_keywords: ["run", "skill"]
    tags: [self_awareness, persistence]

  - id: l0_09
    level: 0
    task: "Explain your failure taxonomy: what categories does the system classify failures into?"
    expected_outcome_keywords: ["infra", "gap"]
    tags: [self_awareness, failure_taxonomy]

  - id: l0_10
    level: 0
    task: "Explain your MCP tool integration mechanism in a short paragraph."
    expected_outcome_keywords: ["MCP"]
    tags: [self_awareness, mcp]

  # ---------- L1: Atomic operations (15) ----------
  # Goal: single-step deterministic answers. Perfect grading material.

  - id: l1_01
    level: 1
    task: "Reverse the string 'Hello World' and output the result."
    expected_outcome_keywords: ["dlroW olleH"]
    tags: [string_ops]

  - id: l1_02
    level: 1
    task: "Calculate how many days are between 2026-04-21 and 2026-12-31."
    expected_outcome_keywords: ["254"]
    tags: [date_math]

  - id: l1_03
    level: 1
    task: "Extract the value of the 'age' field from this JSON string: '{\"name\": \"alice\", \"age\": 30}'."
    expected_outcome_keywords: ["30"]
    tags: [json_parse]

  - id: l1_04
    level: 1
    task: "Sort the list [3, 1, 4, 1, 5, 9, 2, 6] in ascending order."
    expected_outcome_keywords: ["1", "2", "3", "4", "5", "6", "9"]
    tags: [sorting]

  - id: l1_05
    level: 1
    task: "Parse this CSV fragment into a 2D array: 'a,b,c\\n1,2,3\\n4,5,6'."
    expected_outcome_keywords: ["a", "b", "c", "1", "2", "3"]
    tags: [csv_parse]

  - id: l1_06
    level: 1
    task: "Count how many times 'hello' appears in: 'hello, this is a test. hello again.'"
    expected_outcome_keywords: ["2"]
    tags: [text_count]

  - id: l1_07
    level: 1
    task: "Convert 100 degrees Celsius to Fahrenheit and include the formula."
    expected_outcome_keywords: ["212"]
    tags: [unit_conversion]

  - id: l1_08
    level: 1
    task: "Is 'racecar' a palindrome? Answer yes or no with your reasoning."
    expected_outcome_keywords: ["palindrome", "yes"]
    tags: [string_ops]

  - id: l1_09
    level: 1
    task: "Convert 'the quick brown fox' to Title Case."
    expected_outcome_keywords: ["The Quick Brown Fox"]
    tags: [string_ops]

  - id: l1_10
    level: 1
    task: "Calculate the sum of all integers from 1 to 100 and show your reasoning."
    expected_outcome_keywords: ["5050"]
    tags: [arithmetic]

  - id: l1_11
    level: 1
    task: "Convert the hexadecimal string 'ff' to its decimal value."
    expected_outcome_keywords: ["255"]
    tags: [base_conversion]

  - id: l1_12
    level: 1
    task: "Extract the username and domain from the email 'alice@example.com'."
    expected_outcome_keywords: ["alice", "example.com"]
    tags: [regex, email]

  - id: l1_13
    level: 1
    task: "Convert the ISO 8601 timestamp '2026-04-21T15:30:00+08:00' to UTC."
    expected_outcome_keywords: ["07:30", "UTC"]
    tags: [datetime]

  - id: l1_14
    level: 1
    task: "Count the length of 'multi-agent orchestration' excluding spaces."
    expected_outcome_keywords: ["24"]
    tags: [string_ops]

  - id: l1_15
    level: 1
    task: "Deduplicate the list [1, 2, 2, 3, 3, 3, 4]."
    expected_outcome_keywords: ["1", "2", "3", "4"]
    tags: [list_ops]

  # ---------- L2: Composition (5) ----------
  # Goal: 2-3 step chains, exercising pipeline / review_loop.

  - id: l2_01
    level: 2
    task: |
      Compute quarterly ROI from these numbers:
        - Q1 revenue 1.2M, cost 0.8M
        - Q2 revenue 1.5M, cost 0.9M
      Give the ROI percentage for each quarter and identify which quarter performed better.
    expected_outcome_keywords: ["50%", "66", "Q2"]
    tags: [multi_step, arithmetic, analysis]

  - id: l2_02
    level: 2
    task: |
      Write a 150-word short piece on "three core advantages of multi-agent architecture",
      then have a reviewer provide improvement feedback, then revise once.
    expected_outcome_keywords: ["agent", "advantage"]
    tags: [multi_step, review_loop, content]

  - id: l2_03
    level: 2
    task: |
      Given this log snippet:
        "ERROR 2026-04-21 10:15:22 db connection failed
         WARN  2026-04-21 10:15:23 retry attempt 1
         ERROR 2026-04-21 10:15:25 db connection failed"
      1. Count the ERROR and WARN lines.
      2. Extract all error timestamps.
      3. Give a one-sentence diagnosis.
    expected_outcome_keywords: ["ERROR", "WARN", "db", "connection"]
    tags: [multi_step, log_analysis]

  - id: l2_04
    level: 2
    task: |
      Compare 'monolith architecture' vs 'microservices architecture' across three dimensions:
      development speed, operational complexity, scalability. Output as a table, then a summary.
    expected_outcome_keywords: ["monolith", "microservices", "scalability"]
    tags: [multi_step, comparison]

  - id: l2_05
    level: 2
    task: |
      Break this task into 3-5 subtasks and assign one responsible agent per subtask:
      "Write a technical selection report on AI agent frameworks in 2026, comparing at least 3 frameworks."
    expected_outcome_keywords: ["subtask", "agent"]
    tags: [multi_step, planning]
